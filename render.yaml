services:
  - type: web
    name: vedamaxglass-api
    runtime: node
    repo: https://github.com/seu-usuario/vedamaxglass-api
    plan: free
    region: ohio
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: PORT
        value: "3001"
      - key: UPLOAD_DIR
        value: "./uploads"
